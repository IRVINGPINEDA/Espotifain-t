services:
  mysql:
    image: mysql:8.4
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-spotifynt}
      MYSQL_USER: ${DB_USER:-spotifynt}
      MYSQL_PASSWORD: ${DB_PASSWORD:-spotifynt}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s
    restart: unless-stopped
    networks:
      - spotifynt

  backend:
    build:
      context: ./backend
      target: development
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-spotifynt}
      DB_PASSWORD: ${DB_PASSWORD:-spotifynt}
      DB_NAME: ${DB_NAME:-spotifynt}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      API_URL: ${API_URL:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost,http://localhost:80,http://localhost:5173}
      ADMIN_NAME: ${ADMIN_NAME:-Platform Admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@spotifynt.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!}
      SEED_ON_BOOT: ${SEED_ON_BOOT:-true}
      INIT_DB_ON_BOOT: ${INIT_DB_ON_BOOT:-true}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-10}
      API_RATE_LIMIT_MAX: ${API_RATE_LIMIT_MAX:-200}
      UPLOAD_ROOT: /uploads
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - ./uploads:/uploads
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - spotifynt

  frontend:
    build:
      context: ./frontend
      target: development
    environment:
      NODE_ENV: development
      VITE_API_URL: /api
      VITE_DEV_API_PROXY: http://backend:5000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - spotifynt

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5.2
    profiles:
      - dev
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${DB_USER:-spotifynt}
      PMA_PASSWORD: ${DB_PASSWORD:-spotifynt}
      UPLOAD_LIMIT: 64M
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 25s
    restart: unless-stopped
    networks:
      - spotifynt

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./uploads:/uploads:ro
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - spotifynt

volumes:
  mysql_data:
  backend_node_modules:
  frontend_node_modules:

networks:
  spotifynt:
    driver: bridge
